services:
  - type: web
    name: friseursalon-henkes-backend
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://friseursalon-henkes-website.netlify.app
      # Pflicht: Resend API-Key. Im Render-Dashboard eintragen.
      - key: RESEND_API_KEY
        sync: false
      # Pflicht: Empfangsadresse fuer Salon-Benachrichtigungen.
      - key: SALON_EMAIL
        sync: false
      # Optional: Absenderadresse fuer Kunden-Mails. Default ist
      # "Friseursalon Henkes <onboarding@resend.dev>" (Sandbox).
      # Empfehlung: Eigene Domain bei Resend verifizieren.
      - key: EMAIL_FROM
        sync: false
      # Optional: Reply-To-Adresse fuer Kunden-Mails. Wenn gesetzt,
      # gehen Antworten an diese Adresse statt an SALON_EMAIL.
      - key: EMAIL_USER
        sync: false
      # Optional: Basis-URL fuer Stornier-Links in Kunden-Mails.
      # Sollte auf das deployed Backend zeigen, z.B.
      # https://friseursalon-henkes-backend.onrender.com
      - key: PUBLIC_BASE_URL
        sync: false
      # Pflicht fuer den Admin-Bereich: HTTP Basic Auth.
      # Ohne diese beiden Werte ist /admin.html komplett gesperrt.
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Optional: Shared-Secret fuer den taeglichen Cron-Endpoint
      # (/api/cron/daily-digest). Muss mit dem Wert im externen Cron
      # (z.B. cron-job.org) uebereinstimmen.
      - key: CRON_SECRET
        sync: false
      # Pflicht fuer persistente Termin-Daten: Pfad zum Render-Disk-Mount.
      # Wenn nicht gesetzt -> Server laeuft mit ephemerem Filesystem,
      # Termine gehen bei jedem Deploy/Restart verloren!
      # Voraussetzung: Disk im Render-Dashboard angehaengt, Mount-Path
      # /var/data/henkes (siehe DEPLOYMENT_CHECKLIST.md).
      - key: HENKES_DATA_DIR
        value: /var/data/henkes
      # Optional: Backup-Frequenz und Retention.
      # - key: HENKES_BACKUP_INTERVAL_HOURS
      #   value: "6"
      # - key: HENKES_BACKUP_RETENTION
      #   value: "14"
